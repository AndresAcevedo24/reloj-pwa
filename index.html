<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reloj PWA</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f172a"/>

  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.05);
      --accent: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px 60px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.08);
    }

    h1 {
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .reloj {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .digito {
      font-size: 5rem;
      font-weight: bold;
      color: var(--accent);
      min-width: 2ch;
      transition: transform 0.2s ease;
    }

    .digito.cambio {
      transform: scale(1.2);
    }

    .separador {
      font-size: 4rem;
      color: var(--muted);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    .fecha {
      margin-top: 20px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .estado {
      margin-top: 15px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .dot {
      height: 6px;
      width: 6px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      50% { opacity: 0.3; transform: scale(0.8); }
    }

  </style>
</head>
<body>

  <div class="card">

    <h1>Reloj PWA</h1>

    <div class="reloj">
      <span class="digito" id="horas">00</span>
      <span class="separador">:</span>
      <span class="digito" id="minutos">00</span>
      <span class="separador">:</span>
      <span class="digito" id="segundos">00</span>
    </div>

    <p class="fecha" id="fecha"></p>

    <p class="estado"><span class="dot"></span>Activo</p>

  </div>

  <script src="./app.js"></script>

</body>
</html>
